<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cover {
        width: 300px;
        cursor: pointer;
        border-radius: 10px;
        transition: 0.3s;
        }
        .cover:hover {
        transform: scale(1.05);
        }

        /* Modal nền */
        .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        z-index: 999;
        padding: 40px;
        }

        /* Nút đóng */
        .close {
        color: white;
        font-size: 40px;
        position: absolute;
        top: 10px;
        right: 25px;
        cursor: pointer;
        }

        /* Lưới ảnh */
        .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
        gap: 15px;
        }

        .gallery img {
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        }
        .gallery img:hover {
        transform: scale(1.05);
        }

    </style>
</head>
<body>
    <img src="../asset/test.png" id="cover" class="cover">

<div id="galleryModal" class="modal">
  <span class="close">&times;</span>

  <div class="gallery">
    <img src="../asset/test.png">
    <img src="../asset/test.png">
    <img src="../asset/test.png">
    <img src="../asset/test.png">
  </div>
</div>

</body>
<script>
const cover = document.getElementById("cover");
const modal = document.getElementById("galleryModal");
const closeBtn = document.querySelector(".close");

cover.onclick = () => modal.style.display = "block";
closeBtn.onclick = () => modal.style.display = "none";

window.onclick = (e) => {
  if (e.target == modal) modal.style.display = "none";
}
</script>

</html>
